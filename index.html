<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة سند الرقمية | SANAD AI Legal Platform</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --navy: #0a2342;
            --gold: #c8a96b;
            --white: #ffffff;
            --bg-dark: #07192e;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* خلفية مخصصة باستخدام الصورة المرفوعة court.jpg */
        .background-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(225deg, rgba(10,35,66,0.88) 0%, rgba(4,18,32,0.95) 100%), url('court.jpg');
            background-size: cover;
            background-position: center;
            z-index: -1;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 800px;
            width: 90%;
            z-index: 1;
        }

        /* صندوق الشعار وصورة الهوية */
        .logo-area {
            margin-bottom: 2rem;
        }

        .brand-logo {
            max-width: 180px;
            height: auto;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            border: 2px solid var(--gold);
            margin-bottom: 1.5rem;
        }

        h1 {
            font-size: 2.8rem;
            color: var(--white);
            margin: 10px 0;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .slogan {
            font-size: 1.8rem;
            color: var(--gold);
            margin-top: 15px;
            font-weight: 500;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 15px;
            display: inline-block;
        }

        .description {
            font-size: 1.2rem;
            line-height: 1.8;
            margin: 25px auto;
            max-width: 600px;
            color: #e0e6ed;
        }

        /* أزرار التفاعل */
        .cta-buttons {
            margin-top: 2rem;
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), #b39254);
            color: var(--navy);
            border: none;
            box-shadow: 0 4px 15px rgba(200, 169, 107, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(200, 169, 107, 0.6);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--white);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.9rem;
            color: #a0aec0;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="background-overlay"></div>

    <div class="container">
        <div class="logo-area">
            <img src="logo.jpeg" alt="شعار سند" class="brand-logo">
            <h1>سَـنَـد | SANAD</h1>
            <div class="slogan">حيث تكتمل الحجة ويستقيم الدليل</div>
        </div>

        <p class="description">
            المنصة الذكية الأولى لمواكبة التحديثات القانونية، صياغة العقود بدقة متناهية، والمحاكاة التدريبية الافتراضية بدعم كامل من تقنيات الذكاء الاصطناعي.
        </p>

        <div class="cta-buttons">
            <a href="#" class="btn btn-primary">
                <i class="fas fa-gavel"></i> ابدأ التجربة الآن
            </a>
            <a href="#" class="btn btn-secondary">
                <i class="fas fa-info-circle"></i> اكتشف المزيد
            </a>
        </div>
    </div>

    <footer>
        &copy; 2026 جميع الحقوق محفوظة لمنصة سند الرقمية
    </footer>

</body>
</html>
